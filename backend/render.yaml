services:
  - type: web
    name: watermark-remover-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: CORS_ORIGINS
        value: https://watermark-remover.vercel.app,http://localhost:5173
    limits:
      cpu: 2
      memory: 2Gi
    autoDeploy: true
